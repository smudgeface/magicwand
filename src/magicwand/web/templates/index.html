{% extends "base.html" %}
{% set active_page = "feed" %}

{% block content %}
<main>
  <div class="feed-card">
    <img src="/api/stream" alt="Camera feed">
    <div class="status-bar">
      <span class="status-item">Camera: mock</span>
      <span class="status-sep">•</span>
      <span class="status-item">Stream: active</span>
    </div>
  </div>
  <section class="card event-log-section">
    <div class="event-log-header">
      <h3>Event Log</h3>
      <span id="ws-status" class="ws-status">connecting...</span>
    </div>
    <div id="event-log" class="event-log">
      <!-- Events appear here via WebSocket -->
    </div>
  </section>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/events.js"></script>
{% endblock %}
