[server]
host = "0.0.0.0"
port = 8000

[camera]
width = 640
height = 480
fps = 30
# "auto" tries webcam then picamera2 then mock
# "webcam" for USB/UVC camera, "picamera2" for Pi, "mock" for fake data
source = "auto"
# Webcam settings (used when source is "webcam" or "auto" detects one)
webcam_device = 0
# webcam_exposure = -6.0  # uncomment to set manual exposure (negative = darker)

[camera.mock]
dot_speed = 2.0

[detection]
threshold = 240
min_area = 20
max_area = 5000
blur_kernel = 5
trail_length = 50

[gestures]
directory = "gestures"

[matching]
distance_threshold = 2.0
min_confidence = 0.6
gap_timeout = 0.5
cooldown_time = 2.0
min_gesture_points = 10
resample_count = 32
dwell_speed_threshold = 0.05
dwell_min_points = 3
linearity_threshold = 0.85
min_curvature = 1.57
min_segment_duration = 0.2

[captures]
directory = "captures"
max_captures = 200

[logging]
directory = "logs"
max_file_size = 10000000
max_files = 5

[homebridge]
host = "homebridge.local"
port = 8581

[[homebridge.presets]]
name = "Switch On"
method = "GET"
url_template = "http://{host}:{port}/?accessoryId={accessory_id}&state=true"

[[homebridge.presets]]
name = "Switch Off"
method = "GET"
url_template = "http://{host}:{port}/?accessoryId={accessory_id}&state=false"

[[homebridge.presets]]
name = "Scene Trigger"
method = "GET"
url_template = "http://{host}:{port}/?accessoryId={accessory_id}"
