[server]
host = "0.0.0.0"
port = 8000

[camera]
width = 640
height = 480
fps = 30
# "picamera2" for real hardware, "mock" for development
source = "mock"

[camera.mock]
# Speed multiplier for the figure-8 animation (higher = faster dot)
dot_speed = 2.0

[detection]
threshold = 240
min_area = 20
max_area = 5000
blur_kernel = 5
trail_length = 50

[gestures]
directory = "gestures"

[matching]
distance_threshold = 2.0
min_confidence = 0.6
gap_timeout = 0.5
cooldown_time = 2.0
min_gesture_points = 10
resample_count = 32
dwell_speed_threshold = 0.05
dwell_trim_enabled = true

[captures]
directory = "captures"
max_captures = 200

[logging]
directory = "logs"
max_file_size = 10000000
max_files = 5

[homebridge]
host = "homebridge.local"
port = 8581

[[homebridge.presets]]
name = "Switch On"
method = "GET"
url_template = "http://{host}:{port}/?accessoryId={accessory_id}&state=true"

[[homebridge.presets]]
name = "Switch Off"
method = "GET"
url_template = "http://{host}:{port}/?accessoryId={accessory_id}&state=false"

[[homebridge.presets]]
name = "Scene Trigger"
method = "GET"
url_template = "http://{host}:{port}/?accessoryId={accessory_id}"
