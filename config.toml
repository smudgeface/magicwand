[server]
host = "0.0.0.0"
port = 8000

[camera]
width = 640
height = 480
fps = 30
source = "auto"
webcam_device = 0

[camera.mock]
dot_speed = 2.0

[detection]
threshold = 240
min_area = 20
max_area = 5000
blur_kernel = 5
trail_length = 50

[gestures]
directory = "gestures"

[matching]
distance_threshold = 2
min_confidence = 0.6
gap_timeout = 0.5
cooldown_time = 2
min_gesture_points = 10
resample_count = 32
dwell_speed_threshold = 100
dwell_min_points = 10
linearity_threshold = 0.75
min_curvature = 1.57
min_segment_duration = 0.5

[captures]
directory = "captures"
max_captures = 200

[homebridge]
host = "homebridge.local"
port = 8581

[logging]
directory = "logs"
max_file_size = 10000000
max_files = 5
